<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-src 'self';">
    <title>Conectando LinkedIn - Vitória Net</title>
    <script>
        // Esta página serve como ponte de conexão para o LinkedIn OAuth
        // Ela captura o 'code' da URL e envia para a janela principal (opener)
        window.onload = function() {
            if (window.opener) {
                console.log("[OAUTH BRIDGE] Enviando dados para a janela principal...");
                
                // Envia a URL completa de volta para a janela principal do Hub
                // O Hub local vai processar o código de autorização
                window.opener.postMessage({ type: "oauth-callback", url: window.location.href }, "https://webradiovitoria.com.br"); 
                
                // Exibe mensagem de sucesso visual
                document.getElementById('status').innerText = "Autorização concluída! Esta janela fechará em instantes.";
                
                // Fecha a janela do popup após um pequeno delay para garantir o postMessage
                setTimeout(() => {
                    window.close();
                }, 1500);
            } else {
                // Caso a pessoa abra direto ou o opener tenha sido perdido
                console.warn("[OAUTH BRIDGE] Janela principal não encontrada.");
                document.getElementById('status').innerText = "Conexão finalizada. Você pode fechar esta aba.";
                document.getElementById('loader').style.display = 'none';
            }
        };
    </script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #0f172a; 
            color: white; 
            text-align: center; 
        }
        .container {
            max-width: 400px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .success-icon { 
            font-size: 64px; 
            color: #0077b5; /* LinkedIn Blue */
            margin-bottom: 24px;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        h1 { font-size: 20px; margin: 0 0 12px; font-weight: 700; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #0077b5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">🔗</div>
        <h1>Vitória Net</h1>
        <p id="status">Sincronizando autorização do LinkedIn com o seu painel local...</p>
        <div id="loader" class="loader"></div>
    </div>
</body>
</html>
