<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://ghtkdkauseesambzqfrd.supabase.co; font-src 'self'; frame-src 'self';">
    <title>Conectando Threads - Vitória Net</title>
    <script>
        window.onload = function() {
            var urlParams = new URLSearchParams(window.location.search);
            var code = urlParams.get('code');
            var state = urlParams.get('state');
            var errParam = urlParams.get('error');
            var pathParts = window.location.pathname.split('/').filter(Boolean);
            var platform = pathParts.length >= 3 ? pathParts[2] : '';

            if (code && state && platform) {
                var supabaseUrl = 'https://ghtkdkauseesambzqfrd.supabase.co';
                var anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdodGtka2F1c2Vlc2FtYnpxZnJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NTUwMTQsImV4cCI6MjA4OTUzMTAxNH0.X1OeIwLezATvztpzJzDJWMSUgukNXIWNQp2L1rHkLGs';
                var redirectUri = window.location.origin + window.location.pathname;
                fetch(supabaseUrl + '/functions/v1/social-oauth-callback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + anonKey },
                    body: JSON.stringify({ code: code, state: state, platform: platform, redirect_uri: redirectUri })
                }).then(function(r) { return r.json(); }).then(function(data) {
                    if (data.success) {
                        document.getElementById('status').innerText = 'Conta conectada com sucesso!';
                        document.getElementById('loader').style.display = 'none';
                    }
                }).catch(function() {});
            }

            if (errParam) {
                document.getElementById('status').innerText = 'Autorização cancelada ou recusada.';
                document.getElementById('loader').style.display = 'none';
            } else if (window.opener) {
                window.opener.postMessage({ type: 'oauth-callback', url: window.location.href }, '*');
                document.getElementById('status').innerText = 'Autorização concluída! Esta janela fechará em instantes.';
            } else {
                document.getElementById('status').innerText = 'Conexão finalizada. Verifique o painel para confirmar.';
                document.getElementById('loader').style.display = 'none';
            }

            setTimeout(function() { window.close(); }, 2000);
        };
    </script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #0f172a; 
            color: white; 
            text-align: center; 
        }
        .container {
            max-width: 400px;
            padding: 40px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .success-icon { 
            font-size: 64px; 
            color: #22c55e; 
            margin-bottom: 24px;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        h1 { font-size: 20px; margin: 0 0 12px; font-weight: 700; }
        p { color: #94a3b8; font-size: 14px; line-height: 1.6; }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes scaleIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Vitória Net</h1>
        <p id="status">Sincronizando autorização com o seu painel local...</p>
        <div id="loader" class="loader"></div>
    </div>
</body>
</html>
