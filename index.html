  <!-- SPA Routing Fix for GitHub Pages: restaura a rota após redirect do 404.html -->
  <script>
    (function () {
      var redirect = sessionStorage.getItem('spa_redirect');
      if (redirect) {
        sessionStorage.removeItem('spa_redirect');
        window.history.replaceState(null, null, redirect);
      } else {
        // Lê o padrão /?/path gerado pelo 404.html
        var loc = window.location;
        if (loc.search && loc.search[1] === '/') {
          var parts = loc.search.slice(1).split('&');
          var path = parts[0];
          var query = parts.slice(1).join('&');
          window.history.replaceState(
            null, null,
            path + (query ? '?' + query : '') + loc.hash
          );
        }
      }
    }());
  </script>
